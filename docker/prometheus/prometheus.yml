global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # The data services run under a servlet context-path (/accounts, /statistics,
  # /notifications), so their Actuator endpoints are prefixed accordingly.
  - job_name: account-service
    metrics_path: /accounts/actuator/prometheus
    static_configs:
      - targets: ['account-service:6000']

  - job_name: statistics-service
    metrics_path: /statistics/actuator/prometheus
    static_configs:
      - targets: ['statistics-service:7000']

  - job_name: notification-service
    metrics_path: /notifications/actuator/prometheus
    static_configs:
      - targets: ['notification-service:8000']

  # The Spring Cloud Gateway edge has no context-path.
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:4000']
