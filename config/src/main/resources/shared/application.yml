logging:
  level:
    org.springframework.security: INFO

# Resilience4j (via Spring Cloud CircuitBreaker) replaces Netflix Hystrix.
# Enabling this makes OpenFeign route calls through the circuit breaker so the
# existing @FeignClient(fallback=...) classes are invoked on failure.
spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  rabbitmq:
    host: rabbitmq

# Preserve the old Hystrix 10s command timeout for the slow external calls.
resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s

eureka:
  instance:
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://registry:8761/eureka/
