spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Validate the JWT issuer claim; fetch signing keys from the internal
          # auth-service JWKS (explicit jwk-set-uri avoids OIDC discovery over the
          # browser-facing gateway host).
          issuer-uri: ${AUTH_ISSUER_URI:http://auth-service:5000/uaa}
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://auth-service:5000/uaa/oauth2/jwks}
  data:
    mongodb:
      host: statistics-mongodb
      username: user
      password: ${MONGODB_PASSWORD}
      database: piggymetrics
      port: 27017

server:
  servlet:
    context-path: /statistics
  port: 7000

rates:
  url: https://api.exchangeratesapi.io