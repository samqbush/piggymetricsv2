server:
  servlet:
    context-path: /notifications
  port: 8000

remind:
  cron: 0 0 0 * * *
  email:
    text: "Hey, {0}! We''ve missed you here on PiggyMetrics. It''s time to check your budget statistics.\r\n\r\nCheers,\r\nPiggyMetrics team"
    subject: PiggyMetrics reminder

backup:
  cron: 0 0 12 * * *
  email:
    text: "Howdy, {0}. Your account backup is ready.\r\n\r\nCheers,\r\nPiggyMetrics team"
    subject: PiggyMetrics account backup
    attachment: backup.json

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Validate the JWT issuer claim; fetch signing keys from the internal
          # auth-service JWKS (explicit jwk-set-uri avoids OIDC discovery over the
          # browser-facing gateway host).
          issuer-uri: ${AUTH_ISSUER_URI:http://auth-service:5000/uaa}
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://auth-service:5000/uaa/oauth2/jwks}
      client:
        registration:
          notification-service:
            provider: uaa
            client-id: notification-service
            client-secret: ${NOTIFICATION_SERVICE_PASSWORD}
            authorization-grant-type: client_credentials
            scope: server
        provider:
          uaa:
            token-uri: ${AUTH_TOKEN_URI:http://auth-service:5000/uaa/oauth2/token}
  data:
    mongodb:
      host: notification-mongodb
      username: user
      password: ${MONGODB_PASSWORD}
      database: piggymetrics
      port: 27017
  mail:
    host: smtp.gmail.com
    port: 465
    username: dev-user
    password: dev-password
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          ssl:
            enable: true
