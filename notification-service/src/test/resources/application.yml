remind:
  cron: 0 0 0 * * *
  email:
    text: "Hey, {0}! We''ve missed you here on PiggyMetrics. It''s time to check your budget statistics.\r\n\r\nCheers,\r\nPiggyMetrics team"
    subject: PiggyMetrics reminder

backup:
  cron: 0 0 12 * * *
  email:
    text: "Howdy, {0}. Your account backup is ready.\r\n\r\nCheers,\r\nPiggyMetrics team"
    subject: PiggyMetrics account backup
    attachment: backup.json

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Unreachable placeholder: NimbusJwtDecoder fetches keys lazily, so the
          # context loads without a running auth-service. Security integration
          # tests supply their own decoder/JWTs.
          jwk-set-uri: http://localhost:9999/uaa/oauth2/jwks
      client:
        registration:
          notification-service:
            provider: uaa
            client-id: notification-service
            client-secret: test-secret
            authorization-grant-type: client_credentials
            scope: server
        provider:
          uaa:
            token-uri: http://localhost:9999/uaa/oauth2/token
  data:
    mongodb:
      database: piggymetrics
  mail:
    host: smtp.gmail.com
    port: 465
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          ssl:
            enable: true
