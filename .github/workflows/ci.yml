name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-java-21
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # GitHub-hosted Ubuntu runners ship with Docker, which Testcontainers needs.
      # The reactor (root pom) builds all 7 modules: config, registry, the three
      # data services, the Spring Cloud Gateway edge, and — since the Phase 5
      # security rewrite — auth-service on Spring Authorization Server.
      - name: Build and test
        run: mvn -B verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-java-21
          path: '**/target/site/jacoco'
          if-no-files-found: warn
