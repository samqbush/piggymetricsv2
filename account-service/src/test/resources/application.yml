spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Unreachable placeholder: NimbusJwtDecoder fetches keys lazily, so the
          # context loads without a running auth-service. Security integration
          # tests supply their own decoder/JWTs.
          jwk-set-uri: http://localhost:9999/uaa/oauth2/jwks
      client:
        registration:
          account-service:
            provider: uaa
            client-id: account-service
            client-secret: test-secret
            authorization-grant-type: client_credentials
            scope: server
        provider:
          uaa:
            token-uri: http://localhost:9999/uaa/oauth2/token
  data:
    mongodb:
      database: piggymetrics
